services:
  postgres:
    image: postgres:16-alpine
    container_name: platinum-postgres
    environment:
      POSTGRES_DB: medusa-db
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa-db"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: platinum-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
